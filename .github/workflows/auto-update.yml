name: Update Calendars & Resources

on:
  schedule:
    # every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 25

      - name: Install dependencies
        run: npm install

      - name: Run
        run: node index.js

      - name: Commit & Push Files
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add calendar resources
          git commit -m "GitHub Action - auto-update - $TIMESTAMP (run $GITHUB_RUN_NUMBER)" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }} HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
