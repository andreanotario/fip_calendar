name: Update Calendars & Resources

on:
  schedule:
    # every 30 minutes
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 25

      - name: Install dependencies
        run: npm install

      - name: Run
        run: node index.js

      - name: Commit & Push Files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add calendar/tournaments.ics
          git commit -m "Aggiorna calendario ICS" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}